<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Vim Practice</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #151716;
        --panel: #202421;
        --line: #343a35;
        --text: #eef2ed;
        --muted: #a7b0a7;
        --accent: #f0c75e;
        --good: #77d18a;
        --bad: #ff7a7a;
        --mark: #314f6d;
      }

      * { box-sizing: border-box; }
      body {
        margin: 0;
        background: var(--bg);
        color: var(--text);
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      .app {
        min-height: 100vh;
        display: grid;
        grid-template-columns: minmax(220px, 300px) 1fr;
      }

      aside {
        border-right: 1px solid var(--line);
        background: #111311;
        overflow: auto;
      }

      .brand {
        position: sticky;
        top: 0;
        z-index: 1;
        padding: 18px;
        background: #111311;
        border-bottom: 1px solid var(--line);
      }

      h1, h2, h3, p { margin-top: 0; }
      h1 { font-size: 1.15rem; margin-bottom: 4px; }
      .muted { color: var(--muted); }
      .small { font-size: .88rem; }

      nav { padding: 12px; }
      .group-title {
        margin: 18px 8px 6px;
        color: var(--muted);
        font-size: .75rem;
        text-transform: uppercase;
        letter-spacing: .08em;
      }

      button {
        color: inherit;
        font: inherit;
      }

      .lesson-btn {
        width: 100%;
        min-height: 38px;
        padding: 8px 10px;
        border: 0;
        border-radius: 6px;
        background: transparent;
        text-align: left;
        cursor: pointer;
      }

      .lesson-btn:hover, .lesson-btn.active { background: var(--panel); }
      .lesson-btn.done { color: var(--good); }

      main {
        display: grid;
        grid-template-rows: auto 1fr auto;
        min-width: 0;
      }

      .lesson {
        padding: 24px clamp(16px, 4vw, 44px);
        border-bottom: 1px solid var(--line);
      }

      .commands {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-top: 14px;
      }

      kbd {
        display: inline-flex;
        align-items: center;
        min-height: 30px;
        padding: 3px 9px;
        border: 1px solid var(--line);
        border-bottom-width: 2px;
        border-radius: 5px;
        background: #101210;
        color: var(--accent);
        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        font-size: .92rem;
      }

      .stage {
        padding: 18px clamp(12px, 3vw, 34px);
        min-width: 0;
      }

      .editor-wrap {
        border: 1px solid var(--line);
        border-radius: 8px;
        overflow: hidden;
        background: #0b0d0c;
      }

      .status {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        min-height: 42px;
        padding: 8px 12px;
        background: var(--panel);
        border-bottom: 1px solid var(--line);
      }

      .editor {
        padding: 16px 0;
        overflow: auto;
        outline: 0;
        font: 16px/1.65 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        tab-size: 2;
      }

      .row {
        display: grid;
        grid-template-columns: 44px max-content;
        min-height: 26px;
      }

      .ln {
        padding-right: 10px;
        color: #6f786f;
        text-align: right;
        user-select: none;
      }

      .code {
        white-space: pre;
        padding-right: 28px;
      }

      .cursor {
        background: var(--accent);
        color: #17130a;
      }

      .visual {
        background: var(--mark);
      }

      .toast {
        min-height: 24px;
        margin-top: 12px;
      }

      .ok { color: var(--good); }
      .err { color: var(--bad); }

      footer {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        padding: 14px clamp(16px, 4vw, 44px);
        border-top: 1px solid var(--line);
      }

      .action {
        min-height: 36px;
        padding: 6px 12px;
        border: 1px solid var(--line);
        border-radius: 6px;
        background: var(--panel);
        cursor: pointer;
      }

      .action:hover { border-color: var(--accent); }

      @media (max-width: 820px) {
        .app { grid-template-columns: 1fr; }
        aside { max-height: 42vh; border-right: 0; border-bottom: 1px solid var(--line); }
      }
    </style>
  </head>
  <body>
    <div class="app">
      <aside>
        <div class="brand">
          <h1>Vim Practice</h1>
          <p class="muted small">Keyboard drills only. No login. No backend.</p>
        </div>
        <nav id="nav" aria-label="Lessons"></nav>
      </aside>

      <main>
        <section class="lesson">
          <h2 id="title"></h2>
          <p id="summary" class="muted"></p>
          <div id="commands" class="commands"></div>
        </section>

        <section class="stage">
          <div class="editor-wrap">
            <div class="status">
              <strong id="mode">NORMAL</strong>
              <span id="target" class="muted"></span>
            </div>
            <div id="editor" class="editor" tabindex="0" role="application" aria-label="Vim practice editor"></div>
          </div>
          <div id="toast" class="toast muted" aria-live="polite"></div>
        </section>

        <footer>
          <button id="reset" class="action" type="button">Restart lesson</button>
          <button id="next" class="action" type="button">Next</button>
        </footer>
      </main>
    </div>

    <script type="module" src="./src/app.js"></script>
  </body>
</html>
