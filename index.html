<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Vim Practice</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.19/codemirror.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.19/addon/dialog/dialog.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.19/theme/material-darker.min.css">
    <style>
      :root {
        color-scheme: dark;
        --bg: #151716;
        --panel: #202421;
        --line: #343a35;
        --text: #eef2ed;
        --muted: #a7b0a7;
        --accent: #f0c75e;
        --good: #77d18a;
        --bad: #ff7a7a;
        --mark: #314f6d;
      }

      * { box-sizing: border-box; }
      body {
        margin: 0;
        background: var(--bg);
        color: var(--text);
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      .app {
        min-height: 100vh;
        display: grid;
        grid-template-columns: minmax(286px, 390px) 1fr;
      }

      aside {
        border-right: 1px solid var(--line);
        background: #111311;
        overflow: auto;
      }

      .brand {
        position: sticky;
        top: 0;
        z-index: 1;
        padding: 18px;
        background: #111311;
        border-bottom: 1px solid var(--line);
      }

      h1, h2, h3, p { margin-top: 0; }
      h1 { font-size: 1.15rem; margin-bottom: 4px; }
      .muted { color: var(--muted); }
      .small { font-size: .88rem; }

      nav { padding: 12px; }
      .group-title {
        margin: 22px 8px 8px;
        color: #34d0c3;
        font-size: .9rem;
        font-weight: 800;
        text-transform: uppercase;
        letter-spacing: .08em;
      }

      button {
        color: inherit;
        font: inherit;
      }

      .lesson-btn {
        width: 100%;
        min-height: 48px;
        padding: 8px 10px;
        border: 0;
        border-radius: 6px;
        background: transparent;
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        align-items: center;
        gap: 10px;
        text-align: left;
        cursor: pointer;
      }

      .lesson-btn:hover, .lesson-btn.active { background: var(--panel); }
      .lesson-btn.done { color: var(--good); }
      .lesson-name {
        min-width: 0;
        overflow-wrap: anywhere;
      }
      .lesson-keys {
        display: flex;
        flex-wrap: wrap;
        justify-content: flex-end;
        gap: 6px;
        max-width: 124px;
      }

      .mini-kbd {
        min-width: 32px;
        min-height: 30px;
        padding: 3px 8px;
        border: 1px solid #51657d;
        border-bottom-width: 2px;
        border-radius: 7px;
        background: #2d3b4b;
        color: #fff;
        text-align: center;
        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        font-size: .9rem;
      }

      main {
        display: grid;
        grid-template-rows: auto 1fr auto;
        min-width: 0;
      }

      .lesson {
        padding: 24px clamp(16px, 4vw, 44px);
        border-bottom: 1px solid var(--line);
      }

      .commands {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-top: 14px;
      }

      .tutorial {
        margin-top: 22px;
        border: 1px solid var(--line);
        border-radius: 8px;
        overflow: hidden;
        background: #1b201d;
      }

      .tutorial-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding: 12px 14px;
        border-bottom: 1px solid var(--line);
      }

      .tutorial-title {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 10px;
        min-width: 0;
      }

      .tutorial-title strong {
        overflow-wrap: anywhere;
      }

      .tutorial-body {
        padding: 12px 14px 14px;
      }

      kbd {
        display: inline-flex;
        align-items: center;
        min-height: 30px;
        padding: 3px 9px;
        border: 1px solid var(--line);
        border-bottom-width: 2px;
        border-radius: 5px;
        background: #101210;
        color: var(--accent);
        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        font-size: .92rem;
      }

      .stage {
        padding: 18px clamp(12px, 3vw, 34px);
        min-width: 0;
      }

      .editor-wrap {
        border: 1px solid var(--line);
        border-radius: 8px;
        overflow: hidden;
        background: #0b0d0c;
      }

      .status {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        min-height: 42px;
        padding: 8px 12px;
        background: var(--panel);
        border-bottom: 1px solid var(--line);
      }

      .editor {
        overflow: auto;
      }

      .CodeMirror {
        height: min(58vh, 560px);
        min-height: 360px;
        font: 16px/1.65 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        background: #0b0d0c;
      }

      .CodeMirror-gutters {
        background: #0b0d0c;
        border-right-color: var(--line);
      }

      .tutorial .CodeMirror {
        height: 210px;
        min-height: 210px;
      }

      .tutorial .CodeMirror-cursor {
        border-left: 2px solid var(--accent);
      }

      .toast {
        min-height: 24px;
        margin-top: 12px;
      }

      .ok { color: var(--good); }
      .err { color: var(--bad); }

      footer {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        padding: 14px clamp(16px, 4vw, 44px);
        border-top: 1px solid var(--line);
      }

      .action {
        min-height: 36px;
        padding: 6px 12px;
        border: 1px solid var(--line);
        border-radius: 6px;
        background: var(--panel);
        cursor: pointer;
      }

      .action:hover { border-color: var(--accent); }

      @media (max-width: 820px) {
        .app { grid-template-columns: 1fr; }
        aside { max-height: 42vh; border-right: 0; border-bottom: 1px solid var(--line); }
      }
    </style>
  </head>
  <body>
    <div class="app">
      <aside>
        <div class="brand">
          <h1>Vim Practice</h1>
          <p class="muted small">Keyboard drills only. No login. No backend.</p>
        </div>
        <nav id="nav" aria-label="Lessons"></nav>
      </aside>

      <main>
        <section class="lesson">
          <h2 id="title"></h2>
          <p id="summary" class="muted"></p>
          <div id="commands" class="commands"></div>
          <div class="tutorial">
            <div class="tutorial-head">
              <div class="tutorial-title">
                <strong id="tutorial-title"></strong>
                <span id="tutorial-status" class="muted small">paused</span>
              </div>
              <button id="play-demo" class="action" type="button">Play</button>
            </div>
            <div class="tutorial-body">
              <textarea id="demo-editor" aria-label="Tutorial example"></textarea>
            </div>
          </div>
        </section>

        <section class="stage">
          <div class="editor-wrap">
            <div class="status">
              <strong id="mode">NORMAL</strong>
              <span id="target" class="muted"></span>
            </div>
            <textarea id="editor" class="editor" aria-label="Vim practice editor"></textarea>
          </div>
          <div id="toast" class="toast muted" aria-live="polite"></div>
        </section>

        <footer>
          <button id="reset" class="action" type="button">Restart lesson</button>
          <button id="next" class="action" type="button">Next</button>
        </footer>
      </main>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.19/codemirror.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.19/addon/search/searchcursor.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.19/addon/dialog/dialog.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.19/addon/edit/matchbrackets.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.19/mode/javascript/javascript.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.19/keymap/vim.min.js"></script>
    <script type="module" src="./src/app.js"></script>
  </body>
</html>
