<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Vim Practice</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.19/codemirror.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.19/addon/dialog/dialog.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.19/theme/material-darker.min.css">
    <style>
      :root {
        color-scheme: dark;
        --bg: #151716;
        --panel: #202421;
        --line: #343a35;
        --text: #eef2ed;
        --muted: #a7b0a7;
        --accent: #f0c75e;
        --good: #77d18a;
        --bad: #ff7a7a;
        --mark: #314f6d;
        --target: #2bd889;
        --edit-target: #a84242;
      }

      * { box-sizing: border-box; }
      body {
        margin: 0;
        background: var(--bg);
        color: var(--text);
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      .app {
        min-height: 100vh;
        display: grid;
        grid-template-columns: minmax(286px, 390px) 1fr;
      }

      aside {
        border-right: 1px solid var(--line);
        background: #111311;
        overflow: auto;
      }

      .brand {
        position: sticky;
        top: 0;
        z-index: 1;
        padding: 18px;
        background: #111311;
        border-bottom: 1px solid var(--line);
      }

      h1, h2, h3, p { margin-top: 0; }
      h1 { font-size: 1.15rem; margin-bottom: 4px; }
      .muted { color: var(--muted); }
      .small { font-size: .88rem; }

      nav { padding: 12px; }
      .group-title {
        margin: 22px 8px 8px;
        color: #34d0c3;
        font-size: .9rem;
        font-weight: 800;
        text-transform: uppercase;
        letter-spacing: .08em;
      }

      button {
        color: inherit;
        font: inherit;
      }

      .lesson-btn {
        width: 100%;
        min-height: 48px;
        padding: 8px 10px;
        border: 0;
        border-radius: 6px;
        background: transparent;
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        align-items: center;
        gap: 10px;
        text-align: left;
        cursor: pointer;
      }

      .lesson-btn:hover, .lesson-btn.active { background: var(--panel); }
      .lesson-btn.done { color: var(--good); }
      .lesson-name {
        min-width: 0;
        overflow-wrap: anywhere;
      }
      .lesson-keys {
        display: flex;
        flex-wrap: wrap;
        justify-content: flex-end;
        gap: 6px;
        max-width: 124px;
      }

      .mini-kbd {
        min-width: 32px;
        min-height: 30px;
        padding: 3px 8px;
        border: 1px solid #51657d;
        border-bottom-width: 2px;
        border-radius: 7px;
        background: #2d3b4b;
        color: #fff;
        text-align: center;
        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        font-size: .9rem;
      }

      main {
        display: grid;
        grid-template-rows: auto 1fr auto;
        min-width: 0;
      }

      .lesson {
        padding: 24px clamp(16px, 4vw, 44px);
        border-bottom: 1px solid var(--line);
      }

      .commands {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-top: 14px;
      }

      .tutorial {
        margin-top: 22px;
        border: 1px solid var(--line);
        border-radius: 8px;
        overflow: hidden;
        background: #1b201d;
      }

      .tutorial-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding: 12px 14px;
        border-bottom: 1px solid var(--line);
      }

      .tutorial-title {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 10px;
        min-width: 0;
      }

      .tutorial-title strong {
        overflow-wrap: anywhere;
      }

      .tutorial-body {
        position: relative;
        padding: 12px 14px 14px;
      }

      .demo-key {
        position: absolute;
        top: 22px;
        right: 28px;
        z-index: 2;
        min-width: 86px;
        padding: 10px 18px;
        border: 2px solid #51657d;
        border-bottom-width: 4px;
        border-radius: 8px;
        background: #2d3b4b;
        color: #fff;
        text-align: center;
        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        font-size: clamp(2rem, 5vw, 4rem);
        line-height: 1;
        box-shadow: 0 12px 32px rgb(0 0 0 / 28%);
        opacity: 0;
        transform: translateY(-4px) scale(.96);
        transition: opacity .12s ease, transform .12s ease;
        pointer-events: none;
      }

      .demo-key.show {
        opacity: 1;
        transform: translateY(0) scale(1);
      }

      kbd {
        display: inline-flex;
        align-items: center;
        min-height: 30px;
        padding: 3px 9px;
        border: 1px solid var(--line);
        border-bottom-width: 2px;
        border-radius: 5px;
        background: #101210;
        color: var(--accent);
        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        font-size: .92rem;
      }

      .stage {
        padding: 18px clamp(12px, 3vw, 34px);
        min-width: 0;
      }

      .editor-wrap {
        position: relative;
        border: 1px solid var(--line);
        border-radius: 8px;
        overflow: hidden;
        background: #0b0d0c;
      }

      .tabs {
        display: flex;
        gap: 6px;
        padding: 10px 12px 0;
        background: var(--panel);
      }

      .tab {
        min-height: 30px;
        padding: 4px 10px;
        border: 0;
        border-radius: 5px 5px 0 0;
        background: transparent;
        color: var(--muted);
      }

      .tab.active {
        color: var(--text);
        background: #0b0d0c;
      }

      .status {
        display: flex;
        align-items: center;
        flex-wrap: wrap;
        gap: 12px;
        min-height: 42px;
        padding: 8px 12px;
        background: var(--panel);
        border-bottom: 1px solid var(--line);
      }

      .status .target-text {
        flex: 1 0 100%;
        order: 2;
        min-width: 0;
        color: var(--text);
        font-weight: 700;
        overflow-wrap: anywhere;
      }

      .status .stat {
        order: 3;
      }

      #mode {
        order: 1;
      }

      .stat {
        color: var(--muted);
        font-size: .9rem;
        white-space: nowrap;
      }

      .practice-tip {
        position: absolute;
        top: 86px;
        right: 22px;
        z-index: 4;
        width: 36px;
        height: 36px;
        border: 2px solid var(--target);
        border-radius: 4px;
        background: #101712;
        color: var(--target);
        font: 800 1.25rem/1 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        cursor: help;
        box-shadow: 0 0 0 4px rgb(43 216 137 / 10%);
      }

      .practice-tip::after {
        content: attr(data-tip);
        position: absolute;
        top: 46px;
        right: 0;
        width: min(320px, 70vw);
        padding: 10px 12px;
        border: 1px solid var(--line);
        border-radius: 6px;
        background: #101210;
        color: var(--text);
        font: .9rem/1.4 ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        text-align: left;
        opacity: 0;
        pointer-events: none;
        transform: translateY(-4px);
        transition: opacity .12s ease, transform .12s ease;
      }

      .practice-tip:hover::after,
      .practice-tip:focus-visible::after {
        opacity: 1;
        transform: translateY(0);
      }

      .visual-guide {
        position: absolute;
        inset: 0;
        z-index: 3;
        width: 100%;
        height: 100%;
        pointer-events: none;
        overflow: visible;
      }

      .visual-guide line {
        stroke: var(--target);
        stroke-width: 3;
        stroke-dasharray: 7 7;
      }

      .editor {
        overflow: auto;
      }

      .CodeMirror {
        height: min(58vh, 560px);
        min-height: 360px;
        font: 16px/1.65 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        background: #0b0d0c;
      }

      .CodeMirror-gutters {
        background: #0b0d0c;
        border-right-color: var(--line);
      }

      .tutorial .CodeMirror {
        height: 210px;
        min-height: 210px;
      }

      .tutorial .CodeMirror-cursor {
        border-left: 2px solid var(--accent);
      }

      .cm-target {
        background: var(--target);
        color: #05140d;
        border-radius: 2px;
      }

      .cm-edit-target {
        background: color-mix(in srgb, var(--edit-target) 72%, transparent);
        color: #fff;
        border-radius: 2px;
      }

      .cm-insert-target {
        display: inline-block;
        width: 0;
        height: 1.25em;
        border-left: 3px solid var(--target);
        box-shadow: 0 0 0 4px rgb(43 216 137 / 12%);
        vertical-align: text-bottom;
      }

      .target-bookmark {
        display: inline-block;
        width: .62em;
        min-height: 1.25em;
        vertical-align: text-bottom;
      }

      .toast {
        min-height: 24px;
        margin-top: 12px;
      }

      .ok { color: var(--good); }
      .err { color: var(--bad); }

      footer {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        padding: 14px clamp(16px, 4vw, 44px);
        border-top: 1px solid var(--line);
      }

      .action {
        min-height: 36px;
        padding: 6px 12px;
        border: 1px solid var(--line);
        border-radius: 6px;
        background: var(--panel);
        cursor: pointer;
      }

      .action:hover { border-color: var(--accent); }

      .compact {
        min-height: 30px;
        padding: 4px 10px;
      }

      @media (max-width: 820px) {
        .app { grid-template-columns: 1fr; }
        aside { max-height: 42vh; border-right: 0; border-bottom: 1px solid var(--line); }
      }
    </style>
  </head>
  <body>
    <div class="app">
      <aside>
        <div class="brand">
          <h1>Vim Practice</h1>
          <p class="muted small">Keyboard drills only. No login. No backend.</p>
        </div>
        <nav id="nav" aria-label="Lessons"></nav>
      </aside>

      <main>
        <section class="lesson">
          <h2 id="title"></h2>
          <p id="summary" class="muted"></p>
          <div id="commands" class="commands"></div>
          <div class="tutorial">
            <div class="tutorial-head">
              <div class="tutorial-title">
                <strong id="tutorial-title"></strong>
                <span id="tutorial-status" class="muted small">paused</span>
              </div>
              <button id="play-demo" class="action" type="button">Play</button>
            </div>
            <div class="tutorial-body">
              <div id="demo-key" class="demo-key" aria-hidden="true"></div>
              <textarea id="demo-editor" aria-label="Tutorial example"></textarea>
            </div>
          </div>
        </section>

        <section class="stage">
          <div class="editor-wrap">
            <div class="tabs" aria-label="Practice views">
              <button class="tab active" type="button">Challenge</button>
              <button class="tab" type="button">Stats</button>
              <button class="tab" type="button">Settings</button>
            </div>
            <div class="status">
              <strong id="mode">NORMAL</strong>
              <span id="target" class="muted target-text"></span>
              <span id="goal-count" class="stat">0 / 0 goals</span>
              <span id="timer" class="stat">00:00</span>
              <span id="accuracy" class="stat">100% accuracy</span>
              <span id="speed" class="stat">0.0 goals/min</span>
              <button id="reset" class="action compact" type="button">restart</button>
            </div>
            <button class="practice-tip" type="button" aria-label="Practice help" data-tip="Reach or edit the green highlight using this lesson's Vim motions. Avoid mouse clicks and unrelated keys; they lower accuracy. The cursor will not move for you.">!</button>
            <svg id="visual-guide" class="visual-guide" aria-hidden="true"></svg>
            <textarea id="editor" class="editor" aria-label="Vim practice editor"></textarea>
          </div>
          <div id="toast" class="toast muted" aria-live="polite"></div>
        </section>

        <footer>
          <button id="next" class="action" type="button">Next</button>
        </footer>
      </main>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.19/codemirror.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.19/addon/search/searchcursor.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.19/addon/dialog/dialog.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.19/addon/edit/matchbrackets.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.19/mode/javascript/javascript.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.19/keymap/vim.min.js"></script>
    <script type="module" src="./src/app.js?v=visual-guide-2"></script>
  </body>
</html>
